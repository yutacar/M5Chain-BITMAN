[platformio]
default_envs = m5stack-atoms3r

[env]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
# Keep the ROM/stub connection at its initial rate. Some macOS Native USB CDC
# combinations disconnect as soon as esptool attempts any baud-rate switch.
upload_speed = 115200
upload_flags =
    --no-stub
monitor_speed = 115200
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    https://github.com/m5stack/M5Unified.git#0.2.15
    https://github.com/m5stack/M5Chain.git#1.0.5

# Default configuration: auto-detect Atomic ToChain Base, Atomic Motion Base
# v1.2 PORT B, then the legacy AtomS3R G1/G2 direct connection.
[env:m5stack-atoms3r]
build_flags =
    ${env.build_flags}

# Fixed Atomic ToChain Base configuration.
# HY2.0-4P order is GND, 5V, TX(G5/IO1), RX(G6/IO2).
[env:m5stack-atoms3r-tochain]
build_flags =
    ${env.build_flags}
    -DBITMAN_CHAIN_RX_PIN=6
    -DBITMAN_CHAIN_TX_PIN=5
    -DBITMAN_CHAIN_ATOMIC_TOCHAIN=1

# Fixed Atomic Motion Base v1.2 black PORT B configuration.
# HY2.0-4P order is GND, 5V, TX(G8/IO1), RX(G7/IO2).
[env:m5stack-atoms3r-motion-v12]
build_flags =
    ${env.build_flags}
    -DBITMAN_CHAIN_RX_PIN=7
    -DBITMAN_CHAIN_TX_PIN=8
    -DBITMAN_CHAIN_ATOMIC_MOTION_V12=1

# Legacy direct wiring retained for existing G1/G2 hardware.
[env:m5stack-atoms3r-direct]
build_flags =
    ${env.build_flags}
    -DBITMAN_CHAIN_RX_PIN=1
    -DBITMAN_CHAIN_TX_PIN=2
