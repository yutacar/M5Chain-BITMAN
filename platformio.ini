[platformio]
default_envs = m5stack-atoms3r

[env:m5stack-atoms3r]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
# Keep the ROM/stub connection at its initial rate. Some macOS Native USB CDC
# combinations disconnect as soon as esptool attempts any baud-rate switch.
upload_speed = 115200
upload_flags =
    --no-stub
monitor_speed = 115200
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    https://github.com/m5stack/M5Unified.git#0.2.15
    https://github.com/m5stack/M5Chain.git#1.0.5
